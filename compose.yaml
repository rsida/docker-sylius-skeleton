---
# docker-sylius-skeleton
#
# Requires docker-base (Traefik) to be running.
# Services do NOT expose host ports — Traefik handles routing and TLS.
#
# Usage:
#   cp .env.example .env   # then edit APP_NAME and APP_DOMAIN
#   make install           # first-time setup (installs Sylius + runs migrations)
#   make up                # start containers

networks:
  traefik-net:
    name: ${TRAEFIK_NETWORK:-traefik-net}
    external: true
  internal:
    name: ${APP_NAME:-sylius}-net

services:

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - traefik-net
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-net}"
      # Main app
      - "traefik.http.routers.${APP_NAME:-sylius}.rule=Host(`${APP_DOMAIN:-sylius.local}`)"
      - "traefik.http.routers.${APP_NAME:-sylius}.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME:-sylius}.tls=true"
      - "traefik.http.routers.${APP_NAME:-sylius}.middlewares=secure-headers@file"
      - "traefik.http.services.${APP_NAME:-sylius}.loadbalancer.server.port=80"

  php:
    build:
      context: ./docker/php
    restart: unless-stopped
    volumes:
      - .:/var/www/html:cached
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      DATABASE_URL: mysql://${DB_USER:-sylius}:${DB_PASSWORD:-sylius}@mariadb:3306/${DB_NAME:-sylius}?serverVersion=mariadb-11.0.0&charset=utf8mb4
      MAILER_DSN: smtp://mailer:1025
      DEFAULT_URI: https://${APP_DOMAIN:-sylius.local}
    networks:
      - internal

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-sylius}
      MYSQL_USER: ${DB_USER:-sylius}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sylius}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal

  mailer:
    image: axllent/mailpit
    restart: unless-stopped
    networks:
      - traefik-net
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-net}"
      - "traefik.http.routers.${APP_NAME:-sylius}-mail.rule=Host(`mail.${APP_DOMAIN:-sylius.local}`)"
      - "traefik.http.routers.${APP_NAME:-sylius}-mail.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME:-sylius}-mail.tls=true"
      - "traefik.http.services.${APP_NAME:-sylius}-mail.loadbalancer.server.port=8025"

volumes:
  db_data:
